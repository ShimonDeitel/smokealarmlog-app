name: SmokeAlarmLog
options:
  bundleIdPrefix: com.shimondeitel.smokealarmlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SmokeAlarmLog:
    type: application
    platform: iOS
    sources:
      - path: SmokeAlarmLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.smokealarmlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SmokeAlarmLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SmokeAlarmLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SmokeAlarmLogTests
      - path: SmokeAlarmLog.storekit
    dependencies:
      - target: SmokeAlarmLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.smokealarmlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SmokeAlarmLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SmokeAlarmLogUITests
    dependencies:
      - target: SmokeAlarmLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.smokealarmlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SmokeAlarmLog:
    build:
      targets:
        SmokeAlarmLog: all
        SmokeAlarmLogTests: [test]
        SmokeAlarmLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SmokeAlarmLog.storekit
    test:
      config: Debug
      storeKitConfiguration: SmokeAlarmLog.storekit
      targets:
        - SmokeAlarmLogTests
        - SmokeAlarmLogUITests
    archive:
      config: Release
